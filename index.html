<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Materiales — Síntesis PLA/H₃PO₂ & EIS</title>
    <style>
        :root {
            --bg-deep: #050b12;
            --bg-panel: #0a111c;
            --surface: #111924;
            --border: #1c2a3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-cyan: #00d4ff;
            --accent-mint: #4adec0;
            --accent-ice: #7ec8f8;
            --accent-violet: #a78bfa;
            --accent-amber: #f59e0b;
            --accent-green: #34d399;
            --glass-bg: rgba(10, 18, 28, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --font: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: var(--font);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            color: var(--text-primary);
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
        }

        #three-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            cursor: grab;
        }
        #three-canvas:active {
            cursor: grabbing;
        }
        #three-canvas.clickable-cursor {
            cursor: pointer;
        }

        /* UI Overlay */
        #ui-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            width: 100%;
            height: 100%;
            padding: 16px;
        }
        #ui-panel {
            pointer-events: all;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            max-width: 420px;
            width: 100%;
            align-self: flex-end;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transition: all 0.35s ease;
        }
        #ui-panel.completed-all {
            border-color: var(--accent-mint);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(74, 222, 192, 0.12);
        }

        #panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        #project-title {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--accent-ice);
            text-transform: uppercase;
            white-space: nowrap;
        }
        #step-badge {
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--accent-cyan);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;
            white-space: nowrap;
            transition: all 0.3s;
        }
        #step-badge.completed {
            background: var(--accent-mint);
        }

        #step-description {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
            min-height: 44px;
            transition: all 0.3s;
        }
        #step-instruction {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
            transition: all 0.3s;
        }

        /* Progress bar */
        #progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #progress-bar-outer {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar-inner {
            height: 100%;
            background: var(--accent-cyan);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }
        #progress-text {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            min-width: 30px;
            text-align: right;
        }

        /* Graph panels (step 9) */
        #graphs-container {
            display: none;
            flex-direction: column;
            gap: 12px;
            max-height: 340px;
            transition: all 0.4s;
        }
        #graphs-container.visible {
            display: flex;
        }
        .graph-canvas {
            width: 100%;
            height: 140px;
            background: #080f18;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        #nyquist-canvas {
            height: 150px;
        }
        #bode-canvas {
            height: 150px;
        }
        .graph-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            text-align: center;
            margin-top: -6px;
            margin-bottom: 2px;
        }

        #params-text {
            font-size: 0.7rem;
            color: var(--accent-ice);
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            letter-spacing: 0.02em;
            line-height: 1.5;
            display: none;
        }
        #params-text.visible {
            display: block;
        }

        /* Buttons */
        #btn-reset {
            display: none;
            pointer-events: all;
            background: transparent;
            border: 1px solid var(--accent-violet);
            color: var(--accent-violet);
            padding: 10px 18px;
            border-radius: 20px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all 0.3s;
            align-self: center;
        }
        #btn-reset:hover {
            background: var(--accent-violet);
            color: #000;
        }
        #btn-reset.visible {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #ui-overlay {
                padding: 10px;
                justify-content: flex-end;
            }
            #ui-panel {
                max-width: 100%;
                padding: 14px 16px;
                gap: 10px;
                border-radius: var(--radius-md);
            }
            #project-title {
                font-size: 0.7rem;
            }
            #step-description {
                font-size: 0.9rem;
                min-height: 36px;
            }
            #graphs-container {
                max-height: 240px;
            }
            .graph-canvas {
                height: 100px;
            }
            #nyquist-canvas {
                height: 110px;
            }
            #bode-canvas {
                height: 110px;
            }
        }
        @media (max-width: 480px) {
            #ui-panel {
                padding: 10px 12px;
                gap: 6px;
                border-radius: var(--radius-sm);
            }
            #step-description {
                font-size: 0.8rem;
                min-height: 30px;
            }
            #project-title {
                font-size: 0.65rem;
            }
            .graph-canvas {
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <canvas id="three-canvas"></canvas>
        <div id="ui-overlay">
            <div id="ui-panel">
                <div id="panel-header">
                    <span id="project-title">🔬 PLA/H₃PO₂ · EIS</span>
                    <span id="step-badge">Paso 1 de 9</span>
                </div>
                <div id="step-description">Pesar 1 g de PLA en balanza analítica</div>
                <div id="step-instruction">🖱️ Haz clic sobre la balanza para iniciar</div>
                <div id="progress-container">
                    <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
                    <span id="progress-text">0/9</span>
                </div>
                <div id="graphs-container">
                    <span class="graph-label">Nyquist — Z' vs −Z''</span>
                    <canvas id="nyquist-canvas" class="graph-canvas"></canvas>
                    <span class="graph-label">Bode — log|Z| & Fase vs log(f)</span>
                    <canvas id="bode-canvas" class="graph-canvas"></canvas>
                </div>
                <div id="params-text">Rs=10.2Ω · Rct=48.7Ω · Cdl=12.5µF</div>
                <button id="btn-reset">↺ Reiniciar experiencia</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== DOM ELEMENTS ====================
        const canvas3D = document.getElementById('three-canvas');
        const uiPanel = document.getElementById('ui-panel');
        const stepBadge = document.getElementById('step-badge');
        const stepDescription = document.getElementById('step-description');
        const stepInstruction = document.getElementById('step-instruction');
        const progressBarInner = document.getElementById('progress-bar-inner');
        const progressText = document.getElementById('progress-text');
        const graphsContainer = document.getElementById('graphs-container');
        const nyquistCanvas = document.getElementById('nyquist-canvas');
        const bodeCanvas = document.getElementById('bode-canvas');
        const paramsText = document.getElementById('params-text');
        const btnReset = document.getElementById('btn-reset');
        const nyquistCtx = nyquistCanvas.getContext('2d');
        const bodeCtx = bodeCanvas.getContext('2d');

        // ==================== THREE.JS SETUP ====================
        const renderer = new THREE.WebGLRenderer({ canvas: canvas3D, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog('#050b12', 6, 22);
        scene.background = new THREE.Color('#050b12');

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 40);
        camera.position.set(7, 5.5, 9);
        camera.lookAt(0, 0.6, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 2.5;
        controls.maxDistance = 16;
        controls.maxPolarAngle = Math.PI / 1.7;
        controls.minPolarAngle = 0.25;
        controls.update();
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.25;

        // ==================== LIGHTING ====================
        const ambientLight = new THREE.AmbientLight('#1a2a40', 1.6);
        scene.add(ambientLight);

        const hemisphereLight = new THREE.HemisphereLight('#8899cc', '#1a2230', 0.7);
        scene.add(hemisphereLight);

        const overheadSpot = new THREE.SpotLight('#e8f0ff', 18, 20, Math.PI / 3.5, 0.3, 0.5);
        overheadSpot.position.set(0, 8, 2);
        overheadSpot.castShadow = true;
        overheadSpot.shadow.mapSize.width = 1024;
        overheadSpot.shadow.mapSize.height = 1024;
        overheadSpot.shadow.camera.near = 0.3;
        overheadSpot.shadow.camera.far = 30;
        overheadSpot.shadow.bias = -0.0004;
        overheadSpot.shadow.normalBias = 0.02;
        scene.add(overheadSpot);

        const fillLight = new THREE.PointLight('#8899cc', 8, 12, 1.5);
        fillLight.position.set(-4, 3, 4);
        scene.add(fillLight);

        const accentLight = new THREE.PointLight('#00d4ff', 6, 8, 2);
        accentLight.position.set(3, 2.5, -2);
        scene.add(accentLight);

        // ==================== MATERIALS ====================
        const matLabBench = new THREE.MeshStandardMaterial({ color: '#1a1f28', roughness: 0.55, metalness: 0.3 });
        const matMetalBrushed = new THREE.MeshStandardMaterial({ color: '#889099', roughness: 0.35, metalness: 0.85 });
        const matMetalDark = new THREE.MeshStandardMaterial({ color: '#3a4048', roughness: 0.4, metalness: 0.8 });
        const matGlass = new THREE.MeshStandardMaterial({
            color: '#c8ddf8',
            roughness: 0.15,
            metalness: 0.05,
            transparent: true,
            opacity: 0.45,
            envMapIntensity: 0.3,
        });
        const matGlassBlue = new THREE.MeshStandardMaterial({
            color: '#b8d4f0',
            roughness: 0.12,
            metalness: 0.04,
            transparent: true,
            opacity: 0.5,
        });
        const matPLA = new THREE.MeshStandardMaterial({ color: '#f5f0e8', roughness: 0.5, metalness: 0.02 });
        const matSolution = new THREE.MeshStandardMaterial({
            color: '#5ba8d8',
            roughness: 0.2,
            metalness: 0.03,
            transparent: true,
            opacity: 0.7,
            emissive: '#1a3a50',
            emissiveIntensity: 0.25,
        });
        const matAmber = new THREE.MeshStandardMaterial({
            color: '#f59e0b',
            roughness: 0.2,
            metalness: 0.05,
            emissive: '#3d2000',
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.85,
        });
        const matMembrane = new THREE.MeshStandardMaterial({
            color: '#4ade80',
            roughness: 0.3,
            metalness: 0.05,
            transparent: true,
            opacity: 0.75,
            emissive: '#0a3010',
            emissiveIntensity: 0.3,
        });
        const matDesiccantOrange = new THREE.MeshStandardMaterial({
            color: '#f97316',
            roughness: 0.4,
            metalness: 0.05,
            emissive: '#2a1000',
            emissiveIntensity: 0.2,
        });
        const matGlowRing = new THREE.MeshStandardMaterial({
            color: '#00d4ff',
            roughness: 0.2,
            metalness: 0.1,
            emissive: '#00d4ff',
            emissiveIntensity: 1.2,
            transparent: true,
            opacity: 0.7,
        });
        const matFloor = new THREE.MeshStandardMaterial({ color: '#0d1117', roughness: 0.7, metalness: 0.1 });
        const matWall = new THREE.MeshStandardMaterial({ color: '#0f1620', roughness: 0.6, metalness: 0.08 });

        // ==================== SCENE ENVIRONMENT ====================
        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), matFloor);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.8;
        floor.receiveShadow = true;
        scene.add(floor);

        // Back wall panels
        for (let i = -2; i <= 2; i++) {
            const panel = new THREE.Mesh(new THREE.BoxGeometry(3.2, 5, 0.15), matWall);
            panel.position.set(i * 3.4, 0.7, -5.5);
            panel.castShadow = true;
            panel.receiveShadow = true;
            scene.add(panel);
        }

        // Side shelves
        const shelfGeo = new THREE.BoxGeometry(2.5, 0.12, 0.8);
        for (let sx = -1; sx <= 1; sx += 2) {
            for (let sy = 0; sy < 3; sy++) {
                const shelf = new THREE.Mesh(shelfGeo, matMetalDark);
                shelf.position.set(sx * 7, 0.2 + sy * 1.4, -4);
                shelf.castShadow = true;
                shelf.receiveShadow = true;
                scene.add(shelf);
                // small bottles on shelves
                for (let b = 0; b < 2; b++) {
                    const bottle = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.12, 0.14, 0.5, 16),
                        matGlassBlue
                    );
                    bottle.position.set(sx * 7 + (b - 0.5) * 0.7, 0.2 + sy * 1.4 + 0.35, -4);
                    bottle.castShadow = true;
                    scene.add(bottle);
                }
            }
        }

        // Main lab bench
        const benchTop = new THREE.Mesh(new THREE.BoxGeometry(9, 0.2, 5.5), matLabBench);
        benchTop.position.set(0, 0.6, 0);
        benchTop.receiveShadow = true;
        benchTop.castShadow = true;
        scene.add(benchTop);

        const benchLegsGeo = new THREE.BoxGeometry(0.35, 1.2, 0.35);
        for (let lx = -1; lx <= 1; lx += 2) {
            for (let lz = -1; lz <= 1; lz += 2) {
                const leg = new THREE.Mesh(benchLegsGeo, matMetalDark);
                leg.position.set(lx * 4, -0.1, lz * 2.4);
                leg.castShadow = true;
                leg.receiveShadow = true;
                scene.add(leg);
            }
        }

        // Subtle grid lines on the bench (decorative)
        const gridLineGeo = new THREE.BoxGeometry(8.8, 0.005, 0.04);
        for (let gz = -2; gz <= 2; gz += 0.8) {
            const line = new THREE.Mesh(gridLineGeo, new THREE.MeshStandardMaterial({
                color: '#2a3040',
                roughness: 0.5,
                metalness: 0.3,
                emissive: '#101520',
                emissiveIntensity: 0.3,
            }));
            line.position.set(0, 0.71, gz);
            scene.add(line);
        }

        // ==================== STATION DATA ====================
        const stationPositions = [
            { x: -2.8, z: 1.6, label: 'Pesaje', step: 1 },
            { x: 0, z: 1.6, label: 'Disolución', step: 2 },
            { x: 2.8, z: 1.6, label: 'Adición H₃PO₂', step: 3 },
            { x: -2.8, z: 0, label: 'Agitación 16h', step: 4 },
            { x: 0, z: 0, label: 'Vertido Petri', step: 5 },
            { x: 2.8, z: 0, label: 'Secado 24h', step: 6 },
            { x: -2.8, z: -1.6, label: 'Corte Disco', step: 7 },
            { x: 0, z: -1.6, label: 'Montaje Celda', step: 8 },
            { x: 2.8, z: -1.6, label: 'Medición EIS', step: 9 },
        ];

        // ==================== CREATE STATIONS ====================
        const stations = [];
        const clickableObjects = [];
        const stationGroups = [];
        const glowRings = [];

        function createGlowRing(x, z) {
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.55, 0.04, 16, 32),
                matGlowRing.clone()
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(x, 0.73, z);
            ring.visible = false;
            ring.userData = { baseOpacity: 0.7, pulsePhase: Math.random() * Math.PI * 2 };
            scene.add(ring);
            glowRings.push(ring);
            return ring;
        }

        // --- Station 1: Analytical Balance + PLA pellets ---
        function createStation1(x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0.7, z);

            // Balance base
            const base = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 0.5), matMetalBrushed);
            base.position.y = 0.15;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);

            // Glass enclosure
            const glassEnclosure = new THREE.Mesh(
                new THREE.BoxGeometry(0.55, 0.4, 0.38),
                new THREE.MeshStandardMaterial({
                    color: '#d0e4f8',
                    roughness: 0.08,
                    metalness: 0.03,
                    transparent: true,
                    opacity: 0.3,
                })
            );
            glassEnclosure.position.y = 0.45;
            group.add(glassEnclosure);

            // Platform
            const platform = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.04, 0.3), matMetalDark);
            platform.position.y = 0.28;
            group.add(platform);

            // PLA pellets (small white spheres)
            const pelletsGroup = new THREE.Group();
            pelletsGroup.position.y = 0.32;
            for (let i = 0; i < 8; i++) {
                const pellet = new THREE.Mesh(new THREE.SphereGeometry(0.04, 12, 8), matPLA);
                pellet.position.set(
                    (Math.random() - 0.5) * 0.25,
                    Math.random() * 0.04,
                    (Math.random() - 0.5) * 0.18
                );
                pellet.castShadow = true;
                pelletsGroup.add(pellet);
            }
            pelletsGroup.name = 'pellets';
            group.add(pelletsGroup);

            // Clickable: the balance base
            base.userData = { stationIndex: 0, isClickable: true };
            clickableObjects.push(base);
            group.userData = { mainClickable: base, pelletsGroup };

            return group;
        }

        // --- Station 2: Round-bottom flask + condenser + reflux ---
        function createStation2(x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0.7, z);

            // Magnetic stirrer base
            const stirrerBase = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.18, 0.5), matMetalDark);
            stirrerBase.position.y = 0.1;
            stirrerBase.castShadow = true;
            stirrerBase.receiveShadow = true;
            group.add(stirrerBase);

            // Round-bottom flask
            const flaskSphere = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 24), matGlass);
            flaskSphere.position.y = 0.45;
            flaskSphere.castShadow = true;
            group.add(flaskSphere);

            const flaskNeck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.6, 20), matGlass);
            flaskNeck.position.y = 0.85;
            group.add(flaskNeck);

            // Condenser (outer)
            const condenserOuter = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.0, 20), matGlass);
            condenserOuter.position.y = 1.55;
            group.add(condenserOuter);

            // Condenser inner tube
            const condenserInner = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.05, 16), matGlassBlue);
            condenserInner.position.y = 1.55;
            group.add(condenserInner);

            // Rings on condenser
            for (let r = 0; r < 4; r++) {
                const ring = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.025, 8, 20), matMetalBrushed);
                ring.position.y = 1.1 + r * 0.3;
                group.add(ring);
            }

            // Vapor particles (initially hidden)
            const vaporGroup = new THREE.Group();
            vaporGroup.position.y = 1.9;
            vaporGroup.visible = false;
            for (let v = 0; v < 15; v++) {
                const particle = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 4), new THREE.MeshStandardMaterial({
                    color: '#e8f4ff',
                    roughness: 0.3,
                    transparent: true,
                    opacity: 0.5,
                    emissive: '#ffffff',
                    emissiveIntensity: 0.4,
                }));
                particle.position.set((Math.random() - 0.5) * 0.2, Math.random() * 0.6, (Math.random() - 0.5) * 0.2);
                particle.userData = {
                    baseY: particle.position.y,
                    speed: 0.3 + Math.random() * 0.7,
                    offset: Math.random() * Math.PI * 2,
                };
                vaporGroup.add(particle);
            }
            vaporGroup.name = 'vaporGroup';
            group.add(vaporGroup);

            // Stir bar
            const stirBar = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.03, 0.05), matMetalDark);
            stirBar.position.y = 0.22;
            stirBar.name = 'stirBar';
            group.add(stirBar);

            // Clickable: the flask sphere
            flaskSphere.userData = { stationIndex: 1, isClickable: true };
            clickableObjects.push(flaskSphere);
            group.userData = { mainClickable: flaskSphere, vaporGroup, stirBar, flaskSphere };

            return group;
        }

        // --- Station 3: Flask + Micropipette + H₃PO₂ droplet ---
        function createStation3(x, z) {
            const group = new THREE.Group();

            ring.userData.stationIndex = index;
            stations.push({
                group,

        // ==================== STATE MANAGEMENT ====================
        let currentStep = 0; // 0-indexed (0-8)
        let stepStates = new Array(9).fill('pending'); // 'pending' | 'active' | 'animating' | 'completed'
        let isTransitioning = false;
        let measurementProgress = 0;
        let isMeasuring = false;
        let allCompleted = false;
        stepStates[0] = 'active';

        // Highlight first station
        stations[0].ring.visible = true;
        stations[0].ring.material.emissiveIntensity = 1.2;

        // ==================== EIS DATA GENERATION ====================
        const Rs = 10.2;
        const Rct = 48.7;
        const Cdl = 12.5e-6; // 12.5 µF
        const numEISPoints = 200;
        const freqMin = 0.01;
        const freqMax = 100000;
        const eisData = [];

        for (let i = 0; i < numEISPoints; i++) {
            const logF = Math.log10(freqMin) + (i / (numEISPoints - 1)) * (Math.log10(freqMax) - Math.log10(freqMin));
            const f = Math.pow(10, logF);
            const omega = 2 * Math.PI * f;
            const denom = 1 + Math.pow(omega * Rct * Cdl, 2);
            const Zr = Rs + Rct / denom;
            const Zi = -(Rct * Rct * omega * Cdl) / denom;
            const Zmag = Math.sqrt(Zr * Zr + Zi * Zi);
            const phase = Math.atan2(Zi, Zr) * (180 / Math.PI);
            eisData.push({ f, omega, Zr, Zi, Zmag, phase, logF });
        }

        // ==================== GRAPH DRAWING ====================
        function resizeGraphCanvases() {
            const dpr = Math.min(window.devicePixelRatio, 2);
            const nyquistRect = nyquistCanvas.parentElement.getBoundingClientRect();
            const bodeRect = bodeCanvas.parentElement.getBoundingClientRect();
            const nw = nyquistRect.width - 2;
            const bw = bodeRect.width - 2;
            nyquistCanvas.width = nw * dpr;
            nyquistCanvas.height = 150 * dpr;
            nyquistCanvas.style.width = nw + 'px';
            nyquistCanvas.style.height = '150px';
            bodeCanvas.width = bw * dpr;
            bodeCanvas.height = 150 * dpr;
            bodeCanvas.style.width = bw + 'px';
            bodeCanvas.style.height = '150px';
            nyquistCtx.setTransform(1, 0, 0, 1, 0, 0);
            nyquistCtx.scale(dpr, dpr);
            bodeCtx.setTransform(1, 0, 0, 1, 0, 0);
            bodeCtx.scale(dpr, dpr);
        }

        function drawNyquistPlot(progress = 1) {
            const ctx = nyquistCtx;
            const w = nyquistCanvas.width / (Math.min(window.devicePixelRatio, 2));
            const h = nyquistCanvas.height / (Math.min(window.devicePixelRatio, 2));
            ctx.clearRect(0, 0, w, h);

            const margin = { top: 20, right: 25, bottom: 30, left: 40 };
            const pw = w - margin.left - margin.right;
            const ph = h - margin.top - margin.bottom;

            // Background
            ctx.fillStyle = '#080f18';
            ctx.fillRect(0, 0, w, h);

            // Grid
            ctx.strokeStyle = '#1a2a3a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 5; i++) {
                const gx = margin.left + (i / 5) * pw;
                const gy = margin.top + (i / 5) * ph;
                ctx.beginPath();
                ctx.moveTo(gx, margin.top);
                ctx.lineTo(gx, margin.top + ph);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(margin.left, gy);
                ctx.lineTo(margin.left + pw, gy);
                ctx.stroke();
            }

            // Axes
            ctx.strokeStyle = '#556678';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top + ph);
            ctx.lineTo(margin.left + pw, margin.top + ph);
            ctx.lineTo(margin.left + pw - 8, margin.top + ph - 5);
            ctx.moveTo(margin.left + pw, margin.top + ph);
            ctx.lineTo(margin.left + pw - 8, margin.top + ph + 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top + ph);
            ctx.lineTo(margin.left, margin.top);
            ctx.lineTo(margin.left - 5, margin.top + 8);
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left + 5, margin.top + 8);
            ctx.stroke();

            // Labels
            ctx.fillStyle = '#8899aa';
            ctx.font = '10px system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("Z' (Ω)", margin.left + pw / 2, margin.top + ph + 22);
            ctx.save();
            ctx.translate(margin.left - 32, margin.top + ph / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText("−Z'' (Ω)", 0, 0);
            ctx.restore();

            // Data range
            const zrMin = Rs - 2;
            const zrMax = Rs + Rct + 8;
            const ziMax = Rct / 2 + 5;

            function toX(zr) { return margin.left + ((zr - zrMin) / (zrMax - zrMin)) * pw; }

            function toY(zi) { return margin.top + ph - (zi / ziMax) * ph; }

            // Draw points
            const pointsToDraw = Math.floor(progress * numEISPoints);
            if (pointsToDraw > 1) {
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                let firstPoint = true;
                for (let i = 0; i < pointsToDraw; i++) {
                    const pt = eisData[i];
                    const sx = toX(pt.Zr);
                    const sy = toY(-pt.Zi);
                    if (firstPoint) {
                        ctx.moveTo(sx, sy);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(sx, sy);
                    }
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Highlight last point
                if (pointsToDraw > 0) {
                    const last = eisData[pointsToDraw - 1];
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(toX(last.Zr), toY(-last.Zi), 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Tick labels
            ctx.fillStyle = '#667788';
            ctx.font = '8px system-ui, sans-serif';
            ctx.textAlign = 'center';
            for (let t = 0; t <= 4; t++) {
                const val = zrMin + (t / 4) * (zrMax - zrMin);
                ctx.fillText(val.toFixed(0), toX(val), margin.top + ph + 14);
            }
            ctx.textAlign = 'right';
            for (let t = 0; t <= 4; t++) {
                const val = (t / 4) * ziMax;
                ctx.fillText(val.toFixed(0), margin.left - 6, toY(val) + 3);
            }

            // Rs marker
            ctx.fillStyle = '#f59e0b';
            ctx.font = '9px system-ui, sans-serif';
            ctx.textAlign = 'center';
            const rsX = toX(Rs);
            ctx.fillText('Rs', rsX, margin.top + ph + 26);
            ctx.beginPath();
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = '#f59e0b44';
            ctx.lineWidth = 1;
            ctx.moveTo(rsX, margin.top);
            ctx.lineTo(rsX, margin.top + ph);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawBodePlot(progress = 1) {
            const ctx = bodeCtx;
            const w = bodeCanvas.width / (Math.min(window.devicePixelRatio, 2));
            const h = bodeCanvas.height / (Math.min(window.devicePixelRatio, 2));
            ctx.clearRect(0, 0, w, h);

            const margin = { top: 15, right: 30, bottom: 22, left: 42 };
            const totalH = h - margin.top - margin.bottom;
            const magH = totalH * 0.52;
            const phaseH = totalH * 0.48;
            const pw = w - margin.left - margin.right;

            ctx.fillStyle = '#080f18';
            ctx.fillRect(0, 0, w, h);

            // Divider
            const dividerY = margin.top + magH;
            ctx.strokeStyle = '#1a2a3a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(margin.left, dividerY);
            ctx.lineTo(margin.left + pw, dividerY);
            ctx.stroke();

            // Grids
            ctx.strokeStyle = '#1a2a3a';
            ctx.lineWidth = 0.4;
            for (let i = 0; i <= 5; i++) {
                const gx = margin.left + (i / 5) * pw;
                ctx.beginPath();
                ctx.moveTo(gx, margin.top);
                ctx.lineTo(gx, dividerY);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(gx, dividerY + 2);
                ctx.lineTo(gx, dividerY + 2 + phaseH);
                ctx.stroke();
            }
            for (let i = 0; i <= 3; i++) {
                const gyMag = margin.top + (i / 3) * magH;
                ctx.beginPath();
                ctx.moveTo(margin.left, gyMag);
                ctx.lineTo(margin.left + pw, gyMag);
                ctx.stroke();
                const gyPhase = dividerY + 2 + (i / 3) * phaseH;
                ctx.beginPath();
                ctx.moveTo(margin.left, gyPhase);
                ctx.lineTo(margin.left + pw, gyPhase);
                ctx.stroke();
            }

            const logFmin = Math.log10(freqMin);
            const logFmax = Math.log10(freqMax);

            function toX(logF) { return margin.left + ((logF - logFmin) / (logFmax - logFmin)) * pw; }

            function toYMag(zmag) {
                const logZ = Math.log10(zmag);
                const logZmin = Math.log10(8);
                const logZmax = Math.log10(70);
                return margin.top + magH - ((logZ - logZmin) / (logZmax - logZmin)) * magH;
            }

            function toYPhase(ph) {
                const phMin = -55;
                const phMax = 5;
                return dividerY + 2 + phaseH - ((ph - phMin) / (phMax - phMin)) * phaseH;
            }

            const pointsToDraw = Math.floor(progress * numEISPoints);

            // Magnitude curve
            if (pointsToDraw > 1) {
                ctx.strokeStyle = '#4adec0';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#4adec0';
                ctx.shadowBlur = 4;
                ctx.beginPath();
                let first = true;
                for (let i = 0; i < pointsToDraw; i++) {
                    const pt = eisData[i];
                    const sx = toX(pt.logF);
                    const sy = toYMag(pt.Zmag);
                    if (first) { ctx.moveTo(sx, sy);
                        first = false; } else ctx.lineTo(sx, sy);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Phase curve
            if (pointsToDraw > 1) {
                ctx.strokeStyle = '#a78bfa';
                ctx.lineWidth = 1.8;
                ctx.shadowColor = '#a78bfa';
                ctx.shadowBlur = 4;
                ctx.beginPath();
                let first = true;
                for (let i = 0; i < pointsToDraw; i++) {
                    const pt = eisData[i];
                    const sx = toX(pt.logF);
                    const sy = toYPhase(pt.phase);
                    if (first) { ctx.moveTo(sx, sy);
                        first = false; } else ctx.lineTo(sx, sy);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Labels
            ctx.fillStyle = '#8899aa';
            ctx.font = '9px system-ui, sans-serif';
            ctx.textAlign = 'center';
            const freqs = [0.01, 0.1, 1, 10, 100, 1000, 10000, 100000];
            freqs.forEach(f => {
                const lx = toX(Math.log10(f));
                ctx.fillText(f >= 1000 ? (f / 1000) + 'k' : f, lx, h - 3);
            });
            ctx.fillText('f (Hz)', margin.left + pw / 2, h - 3);

            ctx.save();
            ctx.fillStyle = '#4adec0';
            ctx.font = '8px system-ui, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('log|Z|', margin.left - 4, margin.top + 10);
            ctx.fillText('(Ω)', margin.left - 4, margin.top + 20);
            ctx.restore();

            ctx.save();
            ctx.fillStyle = '#a78bfa';
            ctx.font = '8px system-ui, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('Fase', margin.left - 4, dividerY + 14);
            ctx.fillText('(°)', margin.left - 4, dividerY + 24);
            ctx.restore();
        }

        function updateAllGraphs(progress) {
            drawNyquistPlot(progress);
            drawBodePlot(progress);
        }

        // ==================== CAMERA ANIMATION ====================
        let cameraTargetPos = new THREE.Vector3(0, 0.5, 0);
        let cameraTargetLook = new THREE.Vector3(0, 0.5, 0);
        let isCameraAnimating = false;

        function animateCameraToStation(stationIndex) {
            const sp = stationPositions[stationIndex];
            cameraTargetLook.set(sp.x, 0.55, sp.z);
            const offsetX = 0;
            const offsetY = 2.8;
            const offsetZ = 3.2;
            cameraTargetPos.set(sp.x + offsetX, sp.z > 0 ? offsetY + 0.5 : offsetY, sp.z + offsetZ);
            isCameraAnimating = true;
        }

        // ==================== RAYCASTER ====================
        const raycaster = new THREE.Raycaster();
        raycaster.far = 8;
        const mouse = new THREE.Vector2();

        function getIntersections(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(clickableObjects, false);
        }

        function handleClick(event) {
            if (isTransitioning || allCompleted) return;
            if (isMeasuring) return;

            const intersections = getIntersections(event);
            if (intersections.length > 0) {
                const obj = intersections[0].object;
                if (obj.userData && obj.userData.isClickable && obj.userData.stationIndex === currentStep) {
                    advanceStep();
                }
            }
        }

        function handleTouch(event) {
            if (isTransitioning || allCompleted) return;
            if (isMeasuring) return;
            if (event.touches.length === 1) {
                const touch = event.touches[0];
                const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                const intersections = getIntersections(fakeEvent);
                if (intersections.length > 0) {
                    const obj = intersections[0].object;
                    if (obj.userData && obj.userData.isClickable && obj.userData.stationIndex === currentStep) {
                        advanceStep();
                    }
                }
            }
        }

        // ==================== STEP ADVANCEMENT ====================
        function advanceStep() {
            if (isTransitioning || allCompleted) return;
            isTransitioning = true;

            const prevStation = stations[currentStep];
            prevStation.completed = true;
            prevStation.active = false;
            prevStation.ring.material.emissiveIntensity = 0.35;
            prevStation.ring.material.color.set('#4adec0');
            prevStation.ring.material.emissive.set('#4adec0');
            prevStation.ring.visible = true;
            stepStates[currentStep] = 'completed';

            // Special handling for step 9
            if (currentStep === 8) {
                startEISMeasurement();
                return;
            }

            currentStep++;
            if (currentStep >= 9) {
                finishAllSteps();
                return;
            }

            stepStates[currentStep] = 'active';
            const nextStation = stations[currentStep];
            nextStation.active = true;
            nextStation.ring.visible = true;
            nextStation.ring.material.emissiveIntensity = 1.2;
            nextStation.ring.material.color.set('#00d4ff');
            nextStation.ring.material.emissive.set('#00d4ff');

            animateCameraToStation(currentStep);
            updateUI();
            playStationAnimation(currentStep - 1);

            setTimeout(() => {
                isTransitioning = false;
            }, 900);
        }

        function startEISMeasurement() {
            isMeasuring = true;
            isTransitioning = true;
            measurementProgress = 0;
            stepStates[8] = 'animating';
            updateUI();
            graphsContainer.classList.add('visible');
            paramsText.classList.add('visible');
            resizeGraphCanvases();
            updateAllGraphs(0);

            const measurementDuration = 6000; // 6 seconds
            const startTime = performance.now();

            function animateMeasurement(now) {
                const elapsed = now - startTime;
                measurementProgress = Math.min(elapsed / measurementDuration, 1);
                updateAllGraphs(measurementProgress);

                if (measurementProgress < 1) {
                    requestAnimationFrame(animateMeasurement);
                } else {
                    finishMeasurement();
                }
            }
            requestAnimationFrame(animateMeasurement);
        }

        function finishMeasurement() {
            isMeasuring = false;
            isTransitioning = false;
            stepStates[8] = 'completed';
            stations[8].completed = true;
            stations[8].active = false;
            stations[8].ring.material.emissiveIntensity = 0.35;
            stations[8].ring.material.color.set('#4adec0');
            stations[8].ring.material.emissive.set('#4adec0');
            stations[8].ring.visible = true;
            updateAllGraphs(1);
            allCompleted = true;
            updateUI();
            btnReset.classList.add('visible');
            uiPanel.classList.add('completed-all');
            stepBadge.textContent = '✓ Completado';
            stepBadge.classList.add('completed');
            stepInstruction.textContent = '🎉 Experimento finalizado. Observa los resultados EIS.';
        }

        function finishAllSteps() {
            allCompleted = true;
            isTransitioning = false;
            updateUI();
            btnReset.classList.add('visible');
            uiPanel.classList.add('completed-all');
            stepBadge.textContent = '✓ Completado';
            stepBadge.classList.add('completed');
            stepInstruction.textContent = '🎉 Todos los pasos completados.';
            graphsContainer.classList.add('visible');
            paramsText.classList.add('visible');
            resizeGraphCanvases();
            updateAllGraphs(1);
        }

        function playStationAnimation(stationIndex) {
            const group = stationGroups[stationIndex];
            const ud = group.userData;

            switch (stationIndex) {
                case 0: // Pellets disappear
                    if (ud.pelletsGroup) {
                        ud.pelletsGroup.scale.set(0.01, 0.01, 0.01);
                        setTimeout(() => { ud.pelletsGroup.scale.set(0, 0, 0); }, 400);
                    }
                    break;
                case 1: // Vapor appears, stirrer spins
                    if (ud.vaporGroup) ud.vaporGroup.visible = true;
                    break;
                case 2: // Droplet appears
                    if (ud.droplet) {
                        ud.droplet.visible = true;
                        ud.droplet.position.set(0.42, 0.68, 0);
                    }
                    break;
                case 3: // Stirrer spins faster
                    break;
                case 4: // Liquid appears in Petri
                    if (ud.petriLiquid) ud.petriLiquid.visible = true;
                    break;
                case 5: // Desiccant color change
                    if (ud.desiccantGroup) {
                        ud.desiccantGroup.children.forEach(bead => {
                            bead.userData.colorPhase = 1;
                        });
                    }
                    break;
                case 6: // Disc cut effect
                    if (ud.disc) {
                        ud.disc.scale.set(0.9, 1, 0.9);
                    }
                    break;
                case 7: // Membrane inserted
                    if (ud.membraneInside) ud.membraneInside.visible = true;
                    break;
            }
        }

        function resetExperience() {
            currentStep = 0;
            stepStates = new Array(9).fill('pending');
            stepStates[0] = 'active';
            isTransitioning = false;
            measurementProgress = 0;
            isMeasuring = false;
            allCompleted = false;

            stations.forEach((st, i) => {
                st.completed = false;
                st.active = i === 0;
                st.ring.visible = i === 0;
                st.ring.material.emissiveIntensity = i === 0 ? 1.2 : 0.35;
                st.ring.material.color.set(i === 0 ? '#00d4ff' : '#4adec0');
                st.ring.material.emissive.set(i === 0 ? '#00d4ff' : '#4adec0');
            });

            // Reset station visuals
            const sg0 = stationGroups[0].userData;
            if (sg0.pelletsGroup) { sg0.pelletsGroup.scale.set(1, 1, 1); }
            const sg1 = stationGroups[1].userData;
            if (sg1.vaporGroup) sg1.vaporGroup.visible = false;
            const sg2 = stationGroups[2].userData;
            if (sg2.droplet) { sg2.droplet.visible = false;
                sg2.droplet.position.set(0.42, 0.68, 0); }
            const sg4 = stationGroups[4].userData;
            if (sg4.petriLiquid) sg4.petriLiquid.visible = false;
            const sg5 = stationGroups[5].userData;
            if (sg5.desiccantGroup) {
                sg5.desiccantGroup.children.forEach(bead => {
                    bead.userData.colorPhase = 0;
                    bead.material.color.set('#f97316');
                    bead.material.emissive.set('#2a1000');
                });
            }
            const sg6 = stationGroups[6].userData;
            if (sg6.disc) { sg6.disc.scale.set(1, 1, 1); }
            const sg7 = stationGroups[7].userData;
            if (sg7.membraneInside) sg7.membraneInside.visible = false;

            graphsContainer.classList.remove('visible');
            paramsText.classList.remove('visible');
            btnReset.classList.remove('visible');
            uiPanel.classList.remove('completed-all');
            stepBadge.classList.remove('completed');
            updateAllGraphs(0);

            animateCameraToStation(0);
            updateUI();
            stepInstruction.textContent = '🖱️ Haz clic sobre la balanza para iniciar';
        }

        function updateUI() {
            const step = currentStep + 1;
            stepBadge.textContent = `Paso ${Math.min(step, 9)} de 9`;
            stepBadge.classList.remove('completed');
            progressBarInner.style.width = `${(currentStep / 9) * 100}%`;
            progressText.textContent = `${currentStep}/9`;

            const descriptions = [
                'Pesar 1 g de PLA en balanza analítica',
                'Disolver con calor y reflujo — matraz esférico',
                'Añadir ácido hipofosforoso (H₃PO₂) gota a gota',
                'Agitar durante 16 h para homogeneización',
                'Verter la solución en placa Petri',
                'Secar durante 24 h en desecador',
                'Cortar el disco de membrana con precisión',
                'Montar la muestra en la celda EIS',
                'Iniciar la medición EIS — Espectroscopía de Impedancia',
            ];

            const instructions = [
                '🖱️ Haz clic sobre la balanza para iniciar',
                '🖱️ Haz clic sobre el matraz para disolver',
                '🖱️ Haz clic sobre la micropipeta para añadir',
                '🖱️ Haz clic sobre el matraz para agitar',
                '🖱️ Haz clic sobre el matraz para verter',
                '🖱️ Haz clic sobre el desecador para secar',
                '🖱️ Haz clic sobre el disco de membrana para cortar',
                '🖱️ Haz clic sobre la celda para montar',
                '🖱️ Haz clic sobre la celda para medir',
            ];

            const idx = Math.min(currentStep, 8);
            stepDescription.textContent = descriptions[idx];
            if (!allCompleted && !isMeasuring) {
                stepInstruction.textContent = instructions[idx];
            }
        }

        // ==================== EVENT LISTENERS ====================
        canvas3D.addEventListener('click', handleClick);
        canvas3D.addEventListener('touchend', (e) => {
            e.preventDefault();
            handleTouch(e);
        }, { passive: false });
        btnReset.addEventListener('click', resetExperience);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            resizeGraphCanvases();
            if (graphsContainer.classList.contains('visible')) {
                updateAllGraphs(measurementProgress || 1);
            }
        });

        // Hover cursor
        canvas3D.addEventListener('mousemove', (event) => {
            if (isTransitioning || allCompleted || isMeasuring) {
                canvas3D.classList.remove('clickable-cursor');
                return;
            }
            const intersections = getIntersections(event);
            if (intersections.length > 0 && intersections[0].object.userData?.isClickable &&
                intersections[0].object.userData?.stationIndex === currentStep) {
                canvas3D.classList.add('clickable-cursor');
            } else {
                canvas3D.classList.remove('clickable-cursor');
            }
        });

        // ==================== ANIMATION LOOP ====================
        const clock = new THREE.Clock();

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const elapsed = timestamp * 0.001;

            controls.update();

            // Smooth camera animation
            if (isCameraAnimating) {
                const lerpFactor = 1 - Math.exp(-3.5 * dt);
                controls.target.lerp(cameraTargetLook, lerpFactor);
                camera.position.lerp(cameraTargetPos, lerpFactor * 0.7);
                if (controls.target.distanceTo(cameraTargetLook) < 0.03 &&
                    camera.position.distanceTo(cameraTargetPos) < 0.06) {
                    controls.target.copy(cameraTargetLook);
                    camera.position.copy(cameraTargetPos);
                    isCameraAnimating = false;
                }
            }

            // Glow ring pulsing
            glowRings.forEach(ring => {
                if (ring.visible) {
                    const phase = ring.userData.pulsePhase;
                    const pulse = 0.7 + 0.3 * Math.sin(elapsed * 2.5 + phase);
                    ring.material.opacity = ring.userData.baseOpacity * pulse;
                    ring.scale.setScalar(1 + 0.06 * Math.sin(elapsed * 3 + phase));
                }
            });

            // Station animations
            // Station 1 (index 0): pellets already handled
            // Station 2 (index 1): vapor + stirrer
            if (stationGroups[1]) {
                const ud1 = stationGroups[1].userData;
                if (ud1.vaporGroup && ud1.vaporGroup.visible) {
                    ud1.vaporGroup.children.forEach(particle => {
                        const pd = particle.userData;
                        particle.position.y = pd.baseY + Math.sin(elapsed * pd.speed * 3 + pd.offset) * 0.4;
                        particle.material.opacity = 0.3 + 0.3 * Math.sin(elapsed * pd.speed * 2 + pd.offset);
                    });
                }
                if (ud1.stirBar && stepStates[1] === 'completed') {
                    ud1.stirBar.rotation.y += dt * 8;
                }
            }
            // Station 3 (index 2): droplet animation
            if (stationGroups[2]) {
                const ud2 = stationGroups[2].userData;
                if (ud2.droplet && ud2.droplet.visible && stepStates[2] === 'completed') {
                    ud2.droplet.position.y = 0.68 + Math.sin(elapsed * 1.5) * 0.08;
                }
            }
            // Station 4 (index 3): stirrer
            if (stationGroups[3]) {
                const ud3 = stationGroups[3].userData;
                if (ud3.stirBar && (stepStates[3] === 'completed' || stepStates[3] === 'active')) {
                    ud3.stirBar.rotation.y += dt * 10;
                }
            }
            // Station 5 (index 4): liquid shimmer
            if (stationGroups[4]) {
                const ud4 = stationGroups[4].userData;
                if (ud4.petriLiquid && ud4.petriLiquid.visible) {
                    ud4.petriLiquid.material.emissiveIntensity = 0.25 + 0.1 * Math.sin(elapsed * 3);
                }
            }
            // Station 6 (index 5): desiccant color
            if (stationGroups[5]) {
                const ud5 = stationGroups[5].userData;
                if (ud5.desiccantGroup && stepStates[5] === 'completed') {
                    ud5.desiccantGroup.children.forEach(bead => {
                        if (bead.userData.colorPhase > 0) {
                            bead.userData.colorPhase = Math.min(1, bead.userData.colorPhase + dt * 0.3);
                            const t = bead.userData.colorPhase;
                            const r = 0.98 - t * 0.45;
                            const g = 0.45 + t * 0.25;
                            const b = 0.09 + t * 0.45;
                            bead.material.color.setRGB(r, g, b);
                            bead.material.emissive.setRGB(r * 0.3, g * 0.15, b * 0.3);
                        }
                    });
                }
            }
            // Station 9 (index 8): display panels shimmer
            if (stationGroups[8] && (stepStates[8] === 'animating' || stepStates[8] === 'completed')) {
                const ud8 = stationGroups[8].userData;
                if (ud8.display1) {
                    ud8.display1.material.emissiveIntensity = 0.6 + 0.2 * Math.sin(elapsed * 4);
                }
                if (ud8.display2) {
                    ud8.display2.material.emissiveIntensity = 0.6 + 0.2 * Math.sin(elapsed * 4 + 1);
                }
            }

            // Accent light movement
            accentLight.intensity = 6 + 1.5 * Math.sin(elapsed * 0.7);

            renderer.render(scene, camera);
        }

        // ==================== INITIALIZATION ====================
        function init() {
            resizeGraphCanvases();
            updateAllGraphs(0);
            updateUI();
            stations[0].ring.visible = true;
            stations[0].ring.material.emissiveIntensity = 1.2;
            stations[0].active = true;
            stepStates[0] = 'active';
            animateCameraToStation(0);
            controls.target.set(0, 0.5, 0);
            camera.position.set(7, 5.5, 9);
            controls.update();
            requestAnimationFrame(animate);
        }

        init();

        console.log('🔬 Laboratorio de Materiales — PLA/H₃PO₂ & EIS — Listo');
        console.log('   Estaciones: 9 | Pasos secuenciales | Modelo Randles');
        console.log('   Rs=10.2Ω  Rct=48.7Ω  Cdl=12.5µF');
        console.log('   Haz clic en la balanza (estación 1) para comenzar.');
    </script>
</body>
