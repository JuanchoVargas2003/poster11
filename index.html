<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WebAR EIS PLA</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
body { margin:0; font-family: system-ui; background:#000; overflow:hidden; }
#overlay {
  position:fixed; inset:0; background:#0a0f14;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:10;
}
button {
  padding:15px 25px; font-size:18px; border-radius:10px;
  background:#00c2ff; border:none; color:#000; font-weight:bold;
}
#status { color:#fff; margin-top:20px; font-size:14px; }
</style>
</head>
<body>

<div id="overlay">
  <button id="startBtn">Comenzar experimento</button>
  <div id="status">Esperando inicio...</div>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled:false"
  renderer="logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;"
>

<a-marker preset="hiro">
  <a-box position="0 0.5 0" color="green"></a-box>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
(function(){

const overlay = document.getElementById('overlay');
const btn = document.getElementById('startBtn');
const status = document.getElementById('status');
const scene = document.querySelector('a-scene');

// IMPORTANTE: no ocultar escena, solo overlay encima

scene.addEventListener('loaded', ()=>{
  scene.pause();
  status.innerText = 'Escena lista (pausada)';
});

// Eventos reales de AR.js
scene.addEventListener('camera-init', ()=>{
  status.innerText = 'Cámara iniciada correctamente';
});

scene.addEventListener('camera-error', (e)=>{
  status.innerText = 'Error cámara: ' + e.detail;
});

scene.addEventListener('arjs-video-loaded', ()=>{
  status.innerText = 'Video de cámara activo';
});

btn.addEventListener('click', ()=>{
  // gesto del usuario -> obligatorio para móviles
  overlay.style.display = 'none';
  scene.play();
});

})();
</script>

</body>
</html>
